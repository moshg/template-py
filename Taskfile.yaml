version: '3'

tasks:
  run:
    desc: Run the main script
    cmds:
      - uv run -m template_py.main
  check:
    desc: Check code quality (type + lint + format)
    deps:
      - check:type
      - check:lint
      - check:format
  check:type:
    desc: Typecheck the codebase
    cmds:
      - uv run pyright src
  check:lint:
    desc: Lint the codebase
    cmds:
      - uv run ruff check src
  check:format:
    desc: Check code formatting
    cmds:
      - uv run ruff format --check src
  fix:
    desc: Fix code issues (lint + format)
    cmds:
      - task: fix:lint
      - task: fix:format
  fix:lint:
    desc: Fix linting issues
    cmds:
      - uv run ruff check --fix src
  fix:format:
    desc: Format the codebase
    cmds:
      - uv run ruff format src
  test:
    desc: Run the test suite
    cmds:
      - uv run pytest
  audit:
    desc: Audit dependencies for vulnerabilities
    cmds:
      - uv run --all-groups pip-audit
